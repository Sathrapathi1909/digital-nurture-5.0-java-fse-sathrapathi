<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Gallery</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        caption {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        td {
            padding: 10px;
            text-align: center;
            vertical-align: top;
        }
        .event-image {
            border: 2px solid #777;
            width: 180px;
            height: auto;
            display: block;
            margin: 0 auto 8px;
        }
    </style>
</head>
<body>
    <table>
        <caption>Community Event Gallery</caption>
        <tr>
            <td>
                <img class="event-image" src="https://via.placeholder.com/180x120?text=Market" alt="Farmers market" title="Farmers Market">
                <p>Farmers market with local vendors.</p>
            </td>
            <td>
                <img class="event-image" src="https://via.placeholder.com/180x120?text=Workshop" alt="Art workshop" title="Art Workshop">
                <p>Art workshop for all skill levels.</p>
            </td>
            <td>
                <img class="event-image" src="https://via.placeholder.com/180x120?text=Music" alt="Music concert" title="Music Concert">
                <p>Live music concert in the park.</p>
            </td>
        </tr>
        <tr>
            <td>
                <img class="event-image" src="https://via.placeholder.com/180x120?text=Sports" alt="Sports day" title="Sports Day">
                <p>Sports day for families and friends.</p>
            </td>
            <td>
                <img class="event-image" src="https://via.placeholder.com/180x120?text=Festival" alt="Food festival" title="Food Festival">
                <p>Food festival with local dishes.</p>
            </td>
            <td>
                <img class="event-image" src="https://via.placeholder.com/180x120?text=Talk" alt="Community talk" title="Community Talk">
                <p>Community talk and discussion panel.</p>
            </td>
        </tr>
    </table>
</body>
</html>
