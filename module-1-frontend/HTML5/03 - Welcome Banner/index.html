<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: #d7e9ff;
            padding: 20px;
            border-radius: 8px;
            max-width: 700px;
            margin: 20px auto;
        }
        .highlight {
            color: #1a4d8f;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1>Welcome Back</h1>
        <p>We are glad you are here for the community events.</p>
        <p><span style="color: red; font-weight: bold;">Special offer:</span> Early registration discount available.</p>
        <p class="highlight">Check the event list below and choose your favorite.</p>
    </div>
</body>
</html>
