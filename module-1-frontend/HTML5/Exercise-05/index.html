<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 4px;
        }
        input, select, textarea, button {
            width: 100%;
            max-width: 420px;
            padding: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        output {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Event Registration</h1>
    <form id="registrationForm">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required autofocus>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label for="eventDate">Event Date</label>
            <input type="date" id="eventDate" name="eventDate" required>
        </div>
        <div class="form-group">
            <label for="eventType">Event Type</label>
            <select id="eventType" name="eventType" required>
                <option value="">Select an event type</option>
                <option value="Workshop">Workshop</option>
                <option value="Concert">Concert</option>
                <option value="Festival">Festival</option>
            </select>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Share your expectations" required></textarea>
        </div>
        <button type="submit">Register</button>
        <output id="registrationOutput"></output>
    </form>
    <script>
        const form = document.getElementById('registrationForm');
        const output = document.getElementById('registrationOutput');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const type = document.getElementById('eventType').value;
            output.textContent = name + ', your registration for ' + type + ' is confirmed.';
        });
    </script>
</body>
</html>
