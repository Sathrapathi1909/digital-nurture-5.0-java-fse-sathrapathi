<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS3 Exercise 8</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="eventCard">
        <h1>Event Details</h1>
        <p>This card uses the box model for spacing and border.</p>
    </div>
    <form>
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Your name">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="4" placeholder="Tell us more"></textarea>
        <button type="submit">Submit</button>
    </form>
    <p id="hiddenText">This text is hidden but still takes space.</p>
    <p id="goneText">This text is removed from the layout.</p>
</body>
</html>
